version: 2

project_name: lazyenv

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: lazyenv
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm64
      - goos: windows
        goarch: arm
      - goos: freebsd
        goarch: arm

gomod:
  proxy: true

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat.*:+.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix.*:+.*$"
      order: 1
    - title: Refactor
      regexp: "^.*refactor.*:+.*$"
      order: 2
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

release:
  github:
    owner: lazynop
    name: lazyenv

brews:
  - name: lazyenv
    repository:
      owner: lazynop
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://lazynop.github.io/lazyenv/
    description: "TUI for managing .env files"
    license: "MIT"
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "lazyenv"
    test: |
      system bin/"lazyenv", "--version"

aurs:
  - name: lazyenv-bin
    homepage: https://lazynop.github.io/lazyenv/
    description: "TUI for managing .env files"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/lazyenv-bin.git"
    skip_upload: auto
    maintainers:
      - "lazynop"
    provides:
      - lazyenv
    conflicts:
      - lazyenv
    package: |-
      install -Dm755 "./lazyenv" "${pkgdir}/usr/bin/lazyenv"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/lazyenv-bin/LICENSE"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
