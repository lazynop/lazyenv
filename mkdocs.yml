site_name: lazyenv
site_description: TUI for managing .env files
site_url: https://lazynop.github.io/lazyenv/
site_dir: public

repo_url: https://github.com/lazynop/lazyenv
repo_name: lazynop/lazyenv

theme:
  name: material
  icon:
    logo: material/console
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.path
    - navigation.instant
    - navigation.instant.progress
    - navigation.footer
    - toc.integrate
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share

copyright: "&copy; Copyright 2026, Steven Raimondi"

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lazynop/lazyenv

plugins:
  - search

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Features: features.md
  - Configuration: configuration.md
  - Keybindings: keybindings.md
  - Changelog: changelog.md
