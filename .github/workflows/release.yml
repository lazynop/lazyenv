name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Setup AUR SSH
        run: |
          if [ -n "$AUR_KEY" ]; then
            mkdir -p ~/.ssh
            echo "$AUR_KEY" > ~/.ssh/aur
            chmod 600 ~/.ssh/aur
            ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          fi
        env:
          AUR_KEY: ${{ secrets.AUR_KEY }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          AUR_KEY: ~/.ssh/aur

      - name: Ping Go module proxy
        run: curl -s "https://proxy.golang.org/github.com/lazynop/lazyenv/@v/${GITHUB_REF_NAME}.info" || true
