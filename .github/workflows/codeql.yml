name: codeql

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: github/codeql-action/init@v4
        with:
          languages: go

      - uses: github/codeql-action/analyze@v4
