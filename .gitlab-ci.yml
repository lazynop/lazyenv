stages:
  - check
  - release

variables:
  GOPATH: $CI_PROJECT_DIR/.go

cache:
  paths:
    - .go/pkg/mod/

.go-template: &go-template
  image: golang:1.24
  before_script:
    - mkdir -p $GOPATH

check:
  <<: *go-template
  stage: check
  script:
    - test -z "$(gofmt -l .)" || (echo "Files need formatting:" && gofmt -l . && exit 1)
    - go vet ./...
    - go test -race -cover ./...

release:
  stage: release
  image: docker:stable
  services:
    - docker:dind
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - docker run --rm
      -v $PWD:/go/src/gitlab.com/traveltoaiur/lazyenv
      -w /go/src/gitlab.com/traveltoaiur/lazyenv
      -e GITLAB_TOKEN
      goreleaser/goreleaser release --clean
