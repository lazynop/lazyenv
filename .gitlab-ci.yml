stages:
  - check
  - docs
  - release

variables:
  GOPATH: $CI_PROJECT_DIR/.go

cache:
  paths:
    - .go/pkg/mod/

check:
  stage: check
  image: golang:1.26
  before_script:
    - mkdir -p $GOPATH
  script:
    - test -z "$(gofmt -l *.go internal/)" || (echo "Files need formatting:" && gofmt -l *.go internal/ && exit 1)
    - go vet ./...
    - go test -race -cover ./...
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

pages:
  stage: docs
  image: golang:1.26
  before_script:
    - apt-get update -qq && apt-get install -y -qq pandoc
    - go install github.com/princjef/gomarkdoc/cmd/gomarkdoc@latest
  script:
    - mkdir -p public
    - gomarkdoc ./... > public/api.md
    - pandoc public/api.md -s --metadata title="LazyEnv API" -o public/index.html
  artifacts:
    paths:
      - public/
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

release:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  before_script: []
  cache: []
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - goreleaser release --clean
