stages:
  - check
  - release
  - deploy

variables:
  GOPATH: $CI_PROJECT_DIR/.go

cache:
  paths:
    - .go/pkg/mod/

check:
  stage: check
  image: golang:1.26
  before_script:
    - mkdir -p $GOPATH
  script:
    - test -z "$(gofmt -l *.go internal/)" || (echo "Files need formatting:" && gofmt -l *.go internal/ && exit 1)
    - go vet ./...
    - go test -race -cover ./...
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/


release:
  stage: release
  image:
    name: goreleaser/goreleaser:latest
    entrypoint: [""]
  before_script: []
  cache: []
  variables:
    GIT_DEPTH: 0
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  script:
    - goreleaser release --clean
    - curl -s "https://proxy.golang.org/gitlab.com/traveltoaiur/lazyenv/@v/${CI_COMMIT_TAG}.info" || true

pages:
  stage: deploy
  image: python:latest
  script:
    - cp CHANGELOG.md docs/changelog.md
    - pip install zensical
    - zensical build --clean
  pages:
    publish: public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - docs/**/*
        - mkdocs.yml
        - CHANGELOG.md
