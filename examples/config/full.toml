# Full configuration reference with all available options.
# Copy this file to .lazyenvrc in your project root,
# or to ~/.config/lazyenv/config.toml for global settings.

# Behavior
recursive = false
show-secrets = false
no-backup = false
no-git-check = false
no-mouse = false
read-only = false
sort = "position"                 # "position" | "alphabetical"

# Built-in theme preset. Available: catppuccin-latte, catppuccin-mocha,
# cyberpunk, default-dark, default-light, dracula, everforest, gruvbox-dark,
# gruvbox-light, kanagawa, monokai-pro, nord, one-dark, rose-pine,
# solarized-dark, solarized-light, tokyo-night.
# Omit to use auto-detected dark/light defaults (same as default-dark/light).
# theme = "dracula"

# File detection patterns (glob syntax).
# Exclude is checked first; then include.
[files]
include = [".env", ".env.*", "*.env"]
exclude = ["*.bak"]

# Layout tuning — all values in characters.
[layout]
var-list-max-key-width = 30
diff-max-key-width = 25
matrix-key-width = 20
matrix-col-width = 14
var-list-min-value-width = 10
var-list-padding = 12
diff-min-value-width = 8
diff-padding = 10
file-list-width = 0                  # 0 = auto (1/4 screen, min 20), > 0 = fixed width
mouse-scroll-lines = 1               # lines per mouse wheel event

# Secret detection tuning.
# Pattern convention: "_HOST" → suffix, "PUBLIC_" → prefix, "DATABASE_HOST" → exact.
[secrets]
# Key patterns to never treat as secret (overrides built-in detection).
# safe_patterns = ["_HOST", "_URL", "_ENDPOINT"]
# Key patterns to always treat as secret (in addition to built-ins).
# extra_patterns = ["_CREDENTIAL"]
# Enable entropy-based value heuristic (flags random-looking values ≥16 chars).
value_heuristic = true

# Color overrides (hex). When using a theme, these override individual colors.
# Leave empty or omit to use the theme or auto-detected defaults.
[colors]
# primary = "#BD93F9"
# warning = "#FFB86C"
# error = "#FF5555"
# success = "#50FA7B"
# muted = "#6272A4"
# fg = "#F8F8F2"
# bg = "#282A36"
# border = "#44475A"
# cursor-bg = "#44475A"
# modified = "#FFB86C"
# added = "#50FA7B"
# deleted = "#FF5555"
